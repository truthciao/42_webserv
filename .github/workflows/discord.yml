name: Notify Discord on main updates

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')

    steps:
      - name: Send message to Discord
        run: |
          MESSAGE=""
          MENTION=""

          # ✅ GitHub → Discord 映射
          if [ "${{ github.actor }}" = "truthciao" ]; then
            MENTION="<@1291448390420271185>"
          else
            MENTION="<@738256818232623236>"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            MESSAGE="🚀 New push to main\n👤 Author: ${{ github.actor }}\n📝 Commit: ${{ github.event.head_commit.message }}"
          else
            MESSAGE="✅ PR merged into main\n👤 Author: ${{ github.event.pull_request.user.login }}\n📌 Title: ${{ github.event.pull_request.title }}"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"$MENTION\n$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
