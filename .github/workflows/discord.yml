name: Notify Discord on main updates

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed to get previous commit for diff

      - name: Send message to Discord
        run: |
          MENTION=""
          ACTOR="${{ github.actor }}"

          if [ "$ACTOR" = "truthciao" ]; then
            MENTION="<@1291448390420271185>"
          else
            MENTION="<@738256818232623236>"
          fi

          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          COMMIT_URL="${{ github.event.head_commit.url }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          AVATAR="https://github.com/$ACTOR.png" # 头像 URL
          TIME_STRING=$(date -d "$TIMESTAMP" -u +"%Y-%m-%d %H:%M:%S UTC")

          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)

          if [ -n "$CHANGED_FILES" ]; then
            FILE_LIST=$(echo "$CHANGED_FILES" | sed 's/^/  - /')
          else
            FILE_LIST="  - (no files changed in this push)"
          fi

          LOG_CONTENT=$(cat <<EOF
# New merge detected on branch 'main'

Author:     $ACTOR
Timestamp:  $TIME_STRING
Message:    "$COMMIT_MSG"

Files Changed:
$FILE_LIST
EOF
          )

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"$MENTION\",
            \"embeds\": [{
              \"title\": \"🚀 View Commit on GitHub\",
              \"url\": \"$COMMIT_URL\",
              \"color\": 2895667,
              \"description\": \"\`\`\`yaml\n$LOG_CONTENT\n\`\`\`\",
              \"thumbnail\": {
                \"url\": \"$AVATAR\"
              },
              \"footer\": {
                \"text\": \"${{ github.repository }}\"
              }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
