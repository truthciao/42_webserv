name: Notify Discord on main updates

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord
        run: |
          MENTION=""
          ACTOR="${{ github.actor }}"

          if [ "$ACTOR" = "truthciao" ]; then
            MENTION="<@738256818232623236>"
          else
            MENTION="<@738256818232623236>"
          fi

          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          COMMIT_URL="${{ github.event.head_commit.url }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          AVATAR="https://github.com/$ACTOR.png"
          EPOCH=$(date -d "$TIMESTAMP" +%s)

          CHANGED_FILES=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" \
            | jq -r '.files[].filename' \
            | head -8)

          if [ -n "$CHANGED_FILES" ]; then
            FILE_LIST=$(echo "$CHANGED_FILES" | sed 's/^/• \`/' | sed 's/$/\`/' | paste -sd '\n')
          else
            FILE_LIST="• \`no file info\`"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"$MENTION\",
            \"embeds\": [{
              \"title\": \"🚀 New merge to main\",
              \"url\": \"$COMMIT_URL\",
              \"color\": 5814783,
              \"description\": \"\\u200b\",
              \"thumbnail\": {
                \"url\": \"$AVATAR\"
              },
              \"fields\": [
                {
                  \"name\": \"\\u200b\",
                  \"value\": \"👤 **Author:** \`$ACTOR\`\\n🕐 **Time:** <t:$EPOCH:R> (<t:$EPOCH:f>)\",
                  \"inline\": false
                },
                {
                  \"name\": \"\\u200b\",
                  \"value\": \"\\u200b\",
                  \"inline\": false
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"\`\`\`$COMMIT_MSG\`\`\`\",
                  \"inline\": false
                },
                {
                  \"name\": \"\\u200b\",
                  \"value\": \"\\u200b\",
                  \"inline\": false
                },
                {
                  \"name\": \"📂 Changed Files\",
                  \"value\": \"$FILE_LIST\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"42 webserv\"
              }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
