<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        p  { color: #7f8c8d; }
        .badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 16px;
            background: #3498db;
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome to the New Site</h1>
        <p>You were redirected here from the <strong>old site</strong>.</p>
        <p>This is the new site. Please update your bookmarks.</p>
        <div class="badge">Redirected from old site</div>
    </div>
</body>
</html>
