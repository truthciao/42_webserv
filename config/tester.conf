server {
    listen 8080;
    server_name localhost;
    # client_max_body_size 100;

    error_page 404 /www/error_pages/404.html;
    error_page 500 /www/error_pages/500.html;

    cgi .py /usr/bin/python3;
    cgi .php /usr/local/bin/php-cgi;
    cgi .bla /home/yshi/yshi/42_webserv/cgi_tester;

    location / {
        allow_methods GET;
        root www/first;
        index index.html;
        autoindex off;
    }

    location /post_body/ {
        allow_methods POST;
        client_max_body_size 100;       
    }

    location /directory/ {
        allow_methods GET;
        root YoupiBanane;
        index youpi.bad_extension;
    }
}
