server {
    listen 8088;
    server_name localhost;
    # client_max_body_size 100;
    root YoupiBanane;

    error_page 404 /www/error_pages/404.html;
    error_page 500 /www/error_pages/500.html;

    cgi .py /usr/bin/python3;
    cgi .php /usr/bin/php-cgi;
    cgi .bla /home/yshi/yshi/42_webserv/cgi_tester;


    location / {
        allow_methods GET;
        root YoupiBanane;
        index index.html;
        autoindex off;
    }

    location /post_body/ {
        allow_methods GET POST;
        client_max_body_size 100;  
        upload_enable on;
        upload_store YoupiBanane/post_body;
    }

    location /directory/ {
        allow_methods GET;
        root YoupiBanane;
        index youpi.bad_extension;
    }
}
