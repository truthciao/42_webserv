# ====================================================================
# Webserv 综合测试配置文件
# 目标：测试 ConfigParser 的健壮性、listen的多种写法以及默认值回退
# ====================================================================

# ---------------------------------------------------------
# Server 1: 完整的标准配置，测试 [情况 C: IP:Port]
# ---------------------------------------------------------
server {
    # 情况 C: 标准的 IP:Port 组合
    listen 127.0.0.1:8080;
    
    server_name webserv.42.fr www.webserv.42.fr;
    
    # 注意：因为你的 Parser 目前用 strtoul 直接转，这里写纯数字(字节)最安全
    # 10485760 bytes = 10 MB
    client_max_body_size 10485760;

    # 错误页面映射
    error_page 404 /www/error_pages/404.html;
    error_page 403 /www/error_pages/403.html;
    error_page 500 /www/error_pages/500.html;

    # 路由 1: 默认静态文件服务
    location / {
        allow_methods GET;
        root /var/www/html;
        index index.html;
        autoindex off;
    }

    # 路由 2: 文件上传测试
    location /upload {
        allow_methods POST GET;
        root /var/www/uploads;
        upload_enable on;
        upload_store /var/www/uploads/data;
    }

    # 路由 3: CGI 脚本处理
    location /cgi-bin {
        allow_methods GET POST;
        root /var/www/cgi-bin;
        
        # 映射多种扩展名到对应的解释器
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
    }

    # 路由 4: HTTP 重定向测试
    location /old-site {
        allow_methods GET;
        # 你的结构体中包含了 redirect_code 和 redirect_url
        return 301 http://127.0.0.1:8080/new-site;
    }
}

# ---------------------------------------------------------
# Server 2: 测试 [情况 D: localhost] 与 缺失项默认值
# ---------------------------------------------------------
server {
    # 情况 D: 解析器应自动将 localhost 转换为 127.0.0.1
    listen localhost:8081;
    
    server_name local.dev;
    
    # 故意不写 client_max_body_size，测试 Parser 是否能保留构造函数中的默认值 (如 1MB)

    location / {
        allow_methods GET;
        root /var/www/local;
        index default.html;
        # 开启目录列表
        autoindex on; 
    }
}

# ---------------------------------------------------------
# Server 3: 测试 [情况 A: 仅端口] 与 独立指令
# ---------------------------------------------------------
server {
    # 情况 A: 只有端口。解析器应将 host 默认设为 0.0.0.0
    listen 8082;
    
    # 也可以用独立指令覆盖默认值（测试你的 else if 兼容逻辑）
    host 192.168.1.100;
    
    server_name standalone.com;
    client_max_body_size 500000;

    location / {
        allow_methods GET;
        root /var/www/standalone;
        index index.html;
        autoindex off;
    }
}

# ---------------------------------------------------------
# Server 4: 测试 [情况 B: 仅 IP]
# ---------------------------------------------------------
server {
    # 情况 B: 只有 IP。解析器应将 port 默认设为你在 _parseServer() 开头写的 8080
    listen 10.0.0.5;
    
    server_name internal.network;
    
    location / {
        allow_methods GET POST DELETE;
        root /var/www/internal;
        index admin.html;
        autoindex off;
    }
}